# Render Blueprint Configuration for Student Information System (SIS)
# This file defines the infrastructure and deployment configuration for Render.com

services:
  # Backend API Service
  - type: web
    name: sis-backend-api
    runtime: node
    repo: https://github.com/yourusername/university-sis.git # Replace with your actual repo
    rootDir: ./backend
    region: oregon # Choose based on your target audience
    plan: starter # Can be upgraded to standard/pro for production
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        fromDatabase:
          name: sis-mongodb
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: CORS_ORIGIN
        value: "https://sis-frontend.onrender.com" # Will be updated with actual frontend URL
      - key: EMAIL_SERVICE
        value: "gmail"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_SECURE
        value: "false"
      - key: EMAIL_USER
        sync: false # Set manually in Render dashboard
      - key: EMAIL_PASS
        sync: false # Set manually in Render dashboard
      - key: SMS_PROVIDER
        value: "twilio"
      - key: TWILIO_ACCOUNT_SID
        sync: false # Set manually in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false # Set manually in Render dashboard
      - key: TWILIO_PHONE_NUMBER
        sync: false # Set manually in Render dashboard
      - key: FILE_UPLOAD_MAX_SIZE
        value: "10485760" # 10MB
      - key: FILE_UPLOAD_ALLOWED_TYPES
        value: "image/jpeg,image/png,image/gif,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false # Set manually if using Cloudinary
      - key: CLOUDINARY_API_KEY
        sync: false # Set manually if using Cloudinary
      - key: CLOUDINARY_API_SECRET
        sync: false # Set manually if using Cloudinary
      - key: REDIS_URL
        fromService:
          type: redis
          name: sis-redis
          property: connectionString
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 70
      targetCPUPercent: 70

  # Frontend Web Service
  - type: web
    name: sis-frontend
    runtime: static
    repo: https://github.com/yourusername/university-sis.git # Replace with your actual repo
    rootDir: ./frontend
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    pullRequestPreviewsEnabled: true
    envVars:
      - key: REACT_APP_API_URL
        value: "https://sis-backend-api.onrender.com/api"
      - key: REACT_APP_APP_NAME
        value: "Student Information System"
      - key: REACT_APP_VERSION
        value: "1.0.0"
      - key: REACT_APP_ENVIRONMENT
        value: "production"
      - key: REACT_APP_DEFAULT_LANGUAGE
        value: "en"
      - key: REACT_APP_SUPPORTED_LANGUAGES
        value: "en,ar"
      - key: REACT_APP_GOOGLE_ANALYTICS_ID
        sync: false # Set manually if using Google Analytics
      - key: GENERATE_SOURCEMAP
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        headers:
          X-Frame-Options: DENY
          X-Content-Type-Options: nosniff
          Referrer-Policy: strict-origin-when-cross-origin
          Permissions-Policy: geolocation=(), microphone=(), camera=()

databases:
  # MongoDB Database
  - name: sis-mongodb
    databaseName: sis_production
    user: sis_user
    region: oregon
    plan: starter # 512MB RAM, 1GB Storage
    version: "6.0"
    
  # Redis Cache (for sessions, caching, etc.)
  - name: sis-redis
    region: oregon
    plan: starter # 25MB RAM
    maxmemoryPolicy: allkeys-lru

# Background Workers (if needed for email/SMS processing)
workers:
  - name: sis-notification-worker
    runtime: node
    repo: https://github.com/yourusername/university-sis.git
    rootDir: ./backend
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm ci
    startCommand: npm run worker:notifications
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: sis-mongodb
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sis-redis
          property: connectionString
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

  - name: sis-file-processor
    runtime: node
    repo: https://github.com/yourusername/university-sis.git
    rootDir: ./backend
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm ci
    startCommand: npm run worker:files
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: sis-mongodb
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false