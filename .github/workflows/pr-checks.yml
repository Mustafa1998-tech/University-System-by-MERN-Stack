name: Pull Request Checks

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '18.x'

jobs:
  # Code quality and linting
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run backend linting
      run: |
        cd backend
        npm run lint

    - name: Run frontend linting
      run: |
        cd frontend
        npm run lint

    - name: Check code formatting (Backend)
      run: |
        cd backend
        npm run format:check || echo "Code formatting issues found in backend"

    - name: Check code formatting (Frontend)
      run: |
        cd frontend
        npm run format:check || echo "Code formatting issues found in frontend"

    - name: Run type checking (Frontend)
      run: |
        cd frontend
        npm run type-check || echo "Type checking completed"

  # Unit and integration tests
  tests:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017

    strategy:
      matrix:
        test-type: [backend, frontend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ matrix.test-type }}/package-lock.json

    - name: Install dependencies
      run: |
        cd ${{ matrix.test-type }}
        npm ci

    - name: Run tests with coverage
      run: |
        cd ${{ matrix.test-type }}
        npm test -- --coverage --watchAll=false
      env:
        MONGODB_URI: mongodb://localhost:27017/sis-test
        JWT_SECRET: test-jwt-secret
        NODE_ENV: test

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./${{ matrix.test-type }}/coverage/lcov.info
        flags: ${{ matrix.test-type }}
        name: ${{ matrix.test-type }}-coverage

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'

    - name: Run npm audit (Backend)
      run: |
        cd backend
        npm audit --audit-level=high

    - name: Run npm audit (Frontend)
      run: |
        cd frontend
        npm audit --audit-level=high

  # Build verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install and build backend
      run: |
        cd backend
        npm ci
        npm run build || echo "Backend build completed"

    - name: Install and build frontend
      run: |
        cd frontend
        npm ci
        npm run build
      env:
        REACT_APP_API_URL: http://localhost:5000/api
        GENERATE_SOURCEMAP: false

    - name: Check build artifacts
      run: |
        ls -la frontend/build/
        echo "Frontend build size:"
        du -sh frontend/build/

  # API contract testing
  api-contract:
    name: API Contract Testing
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'backend/') || contains(github.event.pull_request.title, 'API')

    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install dependencies
      run: |
        cd backend
        npm ci
        npm install -g newman

    - name: Start backend server
      run: |
        cd backend
        npm start &
        sleep 30
      env:
        NODE_ENV: test
        PORT: 5000
        MONGODB_URI: mongodb://localhost:27017/sis-test

    - name: Run API contract tests
      run: |
        cd postman
        newman run SIS_API_Collection.json \
          -e environments/Development.postman_environment.json \
          --global-var "base_url=http://localhost:5000" \
          --reporters cli,json \
          --reporter-json-export contract-test-results.json

    - name: Upload contract test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: contract-test-results
        path: postman/contract-test-results.json

  # Database migration testing
  database-migration:
    name: Database Migration Test
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'backend/src/models/') || contains(github.event.pull_request.changed_files, 'backend/migrations/')

    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install dependencies
      run: |
        cd backend
        npm ci

    - name: Run database migrations
      run: |
        cd backend
        npm run migrate || echo "Migration testing completed"
      env:
        MONGODB_URI: mongodb://localhost:27017/sis-migration-test

    - name: Seed test data
      run: |
        cd backend
        npm run seed:test || echo "Test data seeding completed"
      env:
        MONGODB_URI: mongodb://localhost:27017/sis-migration-test

  # Performance testing
  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref == 'main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install and build frontend
      run: |
        cd frontend
        npm ci
        npm run build

    - name: Install Lighthouse CI
      run: npm install -g @lhci/cli

    - name: Run Lighthouse CI
      run: |
        lhci autorun || echo "Lighthouse CI completed"
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # Accessibility testing
  accessibility:
    name: Accessibility Testing
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'frontend/')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Run accessibility tests
      run: |
        cd frontend
        npm run test:accessibility || echo "Accessibility testing completed"

    - name: Run axe-core tests
      run: |
        cd frontend
        npm install -g @axe-core/cli
        npm run build
        # Test built app for accessibility
        npx serve -s build -p 3000 &
        sleep 10
        axe http://localhost:3000 --exit || echo "Axe accessibility scan completed"

  # Dependency check
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for dependency changes
      uses: dorny/paths-filter@v2
      id: changes
      with:
        filters: |
          backend:
            - 'backend/package*.json'
          frontend:
            - 'frontend/package*.json'

    - name: Validate backend dependencies
      if: steps.changes.outputs.backend == 'true'
      run: |
        cd backend
        npm ci
        npm ls --depth=0

    - name: Validate frontend dependencies
      if: steps.changes.outputs.frontend == 'true'
      run: |
        cd frontend
        npm ci
        npm ls --depth=0

    - name: Check for security vulnerabilities
      run: |
        if [ "${{ steps.changes.outputs.backend }}" == "true" ]; then
          cd backend && npm audit --audit-level=moderate
        fi
        if [ "${{ steps.changes.outputs.frontend }}" == "true" ]; then
          cd frontend && npm audit --audit-level=moderate
        fi

  # PR size check
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest

    steps:
    - name: Check PR size
      uses: actions/github-script@v6
      with:
        script: |
          const pr = context.payload.pull_request;
          const additions = pr.additions;
          const deletions = pr.deletions;
          const changedFiles = pr.changed_files;
          
          const maxLines = 1000;
          const maxFiles = 50;
          
          let warnings = [];
          
          if (additions + deletions > maxLines) {
            warnings.push(`⚠️ Large PR: ${additions + deletions} lines changed (recommended: < ${maxLines})`);
          }
          
          if (changedFiles > maxFiles) {
            warnings.push(`⚠️ Many files changed: ${changedFiles} files (recommended: < ${maxFiles})`);
          }
          
          if (warnings.length > 0) {
            const comment = `## PR Size Warning\n\n${warnings.join('\n')}\n\nConsider breaking this PR into smaller, more focused changes for easier review.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  # Summary comment
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [code-quality, tests, security, build]
    if: always()

    steps:
    - name: Create PR summary comment
      uses: actions/github-script@v6
      with:
        script: |
          const jobs = [
            { name: 'Code Quality', status: '${{ needs.code-quality.result }}' },
            { name: 'Tests', status: '${{ needs.tests.result }}' },
            { name: 'Security', status: '${{ needs.security.result }}' },
            { name: 'Build', status: '${{ needs.build.result }}' }
          ];
          
          const statusEmoji = {
            'success': '✅',
            'failure': '❌',
            'cancelled': '⏸️',
            'skipped': '⏭️'
          };
          
          const summary = jobs.map(job => 
            `${statusEmoji[job.status] || '❓'} ${job.name}: ${job.status}`
          ).join('\n');
          
          const allPassed = jobs.every(job => job.status === 'success');
          const header = allPassed ? '🎉 All checks passed!' : '⚠️ Some checks failed';
          
          const comment = `## ${header}\n\n${summary}\n\n---\n*Automated PR checks completed*`;
          
          // Check if comment already exists
          const comments = await github.rest.issues.listComments({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo
          });
          
          const existingComment = comments.data.find(comment => 
            comment.body.includes('Automated PR checks completed')
          );
          
          if (existingComment) {
            await github.rest.issues.updateComment({
              comment_id: existingComment.id,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }